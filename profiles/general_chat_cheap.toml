[profile]
name = "general_chat_cheap"
as_of = "2026-06-18"
description = "Cheapest acceptable deployment for high-volume general chat: reasoning + preference, tight budget, short jobs."

[constraints]
max_cost_usd = 0.05
budget_basis = "p95"
min_context_tokens = 32000
require_price = true
min_evidence_coverage = 0.30

[workload]
input_tokens = 4000
output_tokens = 1000
calls = 1
retry_multiplier = 1.0
fixed_tool_cost_usd = 0.0

[uncertainty]
p95_token_multiplier = 1.3
p95_tool_multiplier = 1.0

[weights]
reasoning = 0.55
human_preference = 0.25
context_headroom = 0.20

[dimension_map]
reasoning = ["reasoning"]
human_preference = ["preference"]
context_headroom = ["__context__"]

[policy]
missing_prior = 0.50
missing_penalty = 0.10
context_reference_tokens = 1000000
